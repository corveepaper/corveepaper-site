<style>
  /* Smooth-scroll for anchor links (also driven explicitly by JS for the
     magnetic nav buttons — this handles the default-href fallback). */
  html { scroll-behavior: smooth; }
  html, body { margin: 0; background: #e7e8ea; font-family: 'Geist', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  /* Editorial wrapper renders width:100%/height:100% — give it natural
     document flow so its sections stack like a normal page. */
  #root, #root > div.ab { width: 100%; height: auto !important; min-height: 100vh; overflow: visible !important; }

  /* Placeholder image utility (used by PHImg in shared.jsx) */
  .ph {
    background:
      repeating-linear-gradient(135deg, rgba(0,0,0,.04) 0 1px, transparent 1px 8px),
      var(--ph-bg, #e7decf);
    color: rgba(40,30,20,.5);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
  }

  /* Hide custom cursor visually on touch devices (no hover anyway) */
  @media (hover: none) {
    .cp-theme [style*="position: absolute"][style*="z-index: 9999"],
    .cp-theme [style*="position: absolute"][style*="z-index: 9998"] {
      display: none !important;
    }
  }

  /* ───── Accessibility ─────────────────────────────────────────────────────
     Visible focus ring for keyboard users. Tab-only — mouse clicks suppress
     it via :focus-visible (browser-native heuristic). */
  :focus { outline: none; }
  :focus-visible {
    outline: 3px solid #365b86;
    outline-offset: 3px;
    border-radius: 2px;
  }
  /* When the user opts out of motion (OS-level preference), kill animations,
     transitions, and the magnetic cursor. Site stays fully usable. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
    .cp-theme [style*="position: absolute"][style*="z-index: 9999"],
    .cp-theme [style*="position: absolute"][style*="z-index: 9998"] {
      display: none !important;
    }
  }
  /* Visually hidden but available to screen readers (used for ARIA labels on
     icon-only buttons). */
  .sr-only {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0);
    white-space: nowrap; border: 0;
  }

  /* Scroll progress bar */
  .cp-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: transparent; z-index: 100; pointer-events: none;
  }
  .cp-progress > span {
    display: block; height: 100%; width: 0; background: #365b86;
    transition: width .1s linear;
  }

  /* Splash while React mounts */
  #splash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #e7e8ea; z-index: 9999;
    transition: opacity .4s; pointer-events: none;
  }
  #splash.gone { opacity: 0; }
  #splash .logo {
    font-family: 'Spectral', serif; font-size: 48px; color: #192230;
    letter-spacing: -.01em;
  }
  #splash .logo em { color: #365b86; font-style: italic; }
  #splash .dots {
    margin-top: 24px; font-family: 'Geist Mono', monospace;
    font-size: 11px; color: #6B6760; letter-spacing: .14em;
  }

  /* ───── Responsive scaling overrides ─────────────────────────────────────
     The editorial layout was authored at ~1440px. Below that we clamp
     padding + hero type so the page stays usable down to tablet/phone. */
  /* Logo wordmark must not break in two */
  .cp-theme nav span { white-space: nowrap; }

  /* Below 1100px: shrink hero + reduce section padding */
  @media (max-width: 1100px) {
    .cp-theme nav { padding: 14px 24px !important; gap: 16px !important; flex-wrap: wrap; }
    .cp-theme nav > div:last-child { gap: 18px !important; }
    .cp-theme section { padding-left: 32px !important; padding-right: 32px !important; }
    .cp-theme h1 { font-size: clamp(56px, 11vw, 140px) !important; }
    .cp-theme h2 { font-size: clamp(40px, 7vw, 88px) !important; }
    .cp-theme h3[style*="font-size: 72px"] { font-size: clamp(44px, 7vw, 72px) !important; }
  }

  /* Tablet (≤ 900px): hide "Studio · Disponible" tagline + last 3 nav links */
  @media (max-width: 900px) {
    .cp-theme nav > div:first-child > span { display: none !important; }
    /* Magnetic wraps each <a> in a <span>. Hide spans 4-6 (Travaux, Maintenance, FAQ). */
    .cp-theme nav > div:last-child > span:nth-of-type(4),
    .cp-theme nav > div:last-child > span:nth-of-type(5),
    .cp-theme nav > div:last-child > span:nth-of-type(6) { display: none !important; }
  }

  /* Phone (≤ 640px): minimal nav (Logo + theme toggle + Discutons CTA only).
     Nav links are wrapped in <span> (Magnetic), so we hide all wrapper spans
     except the LAST one — that's the Discutons CTA. ThemeToggle is a <button>
     and stays visible. */
  @media (max-width: 640px) {
    .cp-theme nav { padding: 12px 18px !important; gap: 12px !important; flex-wrap: nowrap; }
    .cp-theme nav > div:last-child { gap: 12px !important; }
    .cp-theme nav > div:last-child > span:not(:last-of-type) { display: none !important; }
    .cp-theme section { padding: 56px 18px !important; }
    .cp-theme [style*="grid-template-columns: 1fr 1.6fr"],
    .cp-theme [style*="grid-template-columns: 1fr 1fr"],
    .cp-theme [style*="grid-template-columns: 1.4fr 1fr 1fr"],
    .cp-theme [style*="grid-template-columns: 1.3fr 1fr"],
    .cp-theme [style*="grid-template-columns: 1fr 1.3fr"],
    .cp-theme [style*="grid-template-columns: 1fr auto"],
    .cp-theme [style*="grid-template-columns: repeat(3, 1fr)"],
    .cp-theme [style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }
    /* Compact Discutons CTA */
    .cp-theme nav a[href="#contact"] { padding: 10px 16px !important; font-size: 13px !important; }
  }

  /* Tablet 641-768: stack 2/3-col grids but keep richer nav */
  @media (min-width: 641px) and (max-width: 768px) {
    .cp-theme section { padding: 64px 24px !important; }
    .cp-theme [style*="grid-template-columns: 1fr 1.6fr"],
    .cp-theme [style*="grid-template-columns: 1fr 1fr"],
    .cp-theme [style*="grid-template-columns: 1.4fr 1fr 1fr"],
    .cp-theme [style*="grid-template-columns: 1.3fr 1fr"],
    .cp-theme [style*="grid-template-columns: 1fr 1.3fr"],
    .cp-theme [style*="grid-template-columns: 1fr auto"],
    .cp-theme [style*="grid-template-columns: repeat(3, 1fr)"],
    .cp-theme [style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }
  }

  /* ───── Mobile polish (dedicated phone pass) ──────────────────────────────
     Tame the oversized editorial hero and tighten the contact form on phones. */
  @media (max-width: 640px) {
    /* The ≤1100 clamp bottoms out at 56px, which can overflow a 375px phone
       given the forced <br> line breaks. Bring it down so it always fits. */
    .cp-theme h1 { font-size: clamp(34px, 9.2vw, 60px) !important; }
    /* Hero paragraph slightly smaller for comfortable reading on small screens. */
    .cp-theme section p { font-size: 17px !important; }
    /* Contact form: tighter padding on small screens. */
    .cp-theme form { padding: 24px !important; }
  }
  /* Never let the oversized type create a horizontal scrollbar on small screens. */
  @media (max-width: 900px) { html, body { overflow-x: hidden; } }
</style>
